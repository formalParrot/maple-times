<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maple Times</title>

        <!-- frankenstyle -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/frankenstyle@0.3.7/dist/css/frankenstyle-kit.min.css"
        />

        <link rel="stylesheet" href="" id="themes" />

        <style>
            .crop {
                width: 100%;
                max-width: 100%;
                height: 300px;
                overflow: hidden;
            }

            .crop img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .uk-h1 {
                font-family: "Open Sans", sans-serif;
                font-optical-sizing: auto;
                font-weight: bold;
                font-style: normal;
                font-variation-settings: "wdth" 100;
            }
        </style>

        <!-- open sans -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
        />

        <script
            src="https://cdn.jsdelivr.net/npm/frankenstyle@0.3.7/dist/js/hwc-core.iife.js"
            type="module"
        ></script>

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>

    <body class="bg color" style="--bg: var(--uk-bg); --color: var(--uk-bg-f)">
        <div class="p-5">
            <div
                class="uk-card uk-card-body flex flex-row items-center justify-center gap-6 text-left w-fit mx-auto"
                style="
                    border: 0.5px solid var(--uk-border);
                    position: relative;
                    overflow: visible;
                "
            >
                <div>
                    <h1 class="uk-h1" style="margin: 0; font-weight: bold">
                        Maple Times
                    </h1>
                    <p class="uk-p" style="margin: 0; max-width: 250px">
                        An <i><strong>Air Canada PTFS</strong></i> magazine
                        collection.
                    </p>
                    <p style="font-size: 12px">-owned by milano150</p>
                </div>

                <img
                    src="assets/logo.png"
                    width="120"
                    style="display: block"
                    alt="Maple Times Logo"
                />

                <button
                    id="themeBtn"
                    class="uk-button uk-button-default uk-button-xsmall"
                    style="
                        --bg: var(--uk-secondary);
                        --color: var(--uk-secondary-f);
                        position: absolute;
                        top: 10px;
                        right: 10px;
                        border: 1px solid var(--uk-border);
                    "
                >
                    <uk-icon
                        id="themeIcn"
                        class="size"
                        style="
                            --size: 4;
                            --bg: var(--uk-secondary);
                            --color: var(--uk-secondary-f);
                        "
                        icon="sun"
                    ></uk-icon>
                </button>
            </div>

            <div
                id="magazines"
                class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pt-5"
            ></div>
        </div>

        <script>
            window.Lucide = {};
            window.ApexCharts = {};
        </script>

        <script
            src="https://cdn.jsdelivr.net/npm/frankenstyle@0.3.7/dist/js/hwc-icon.iife.js"
            type="module"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/frankenstyle@0.3.7/dist/js/hwc-components.iife.js"
            type="module"
        ></script>

        <!-- Theme Toggle -->
        <script>
            const btn = document.getElementById("themeBtn");
            const icon = document.getElementById("themeIcn");

            let isLight = localStorage.getItem("theme") === "light";

            function applyTheme() {
                document.documentElement.classList.toggle("dark", !isLight);
                icon.setAttribute("icon", isLight ? "sun" : "moon");
                localStorage.setItem("theme", isLight ? "light" : "dark");
            }

            applyTheme();

            btn.addEventListener("click", () => {
                isLight = !isLight;
                applyTheme();
            });
        </script>

        <!-- CSS path -->
        <script>
            const link = document.getElementById("themes");
            link.href = window.location.hostname.includes("github.io")
                ? "/maple-times/assets/theme.css"
                : "./assets/theme.css";
        </script>

        <!-- Magazine cards -->
        <script>
            fetch("assets/issues.json")
                .then((res) => res.json())
                .then((magazines) => {
                    const container = document.getElementById("magazines");

                    const html = magazines
                        .map((magazine) => {
                            const escape = (s) =>
                                String(s).replace(
                                    /[<>"'&]/g,
                                    (c) =>
                                        ({
                                            "<": "&lt;",
                                            ">": "&gt;",
                                            '"': "&quot;",
                                            "'": "&#39;",
                                            "&": "&amp;",
                                        })[c],
                                );

                            return `<a href="./assets/${magazine.pdf}" target="_blank" style="text-decoration:none;">
                            <div
                                class="uk-card uk-card-body hover:shadow-lg cursor-pointer flex flex-col"
                                style="border: 0.5px solid var(--uk-border)"
                            >
                                <div class="crop">
                                    <img src="${magazine.cover}" alt="${escape(magazine.title)} cover" />
                                </div>
                                <h1 class="uk-h1 text-left mt-5" style="font-weight: normal;">
                                    ${escape(magazine.title)}
                                </h1>
                                <h5 class="uk-h5 text-left mt-2">
                                    <i>Issue #${magazine.issue}</i>
                                </h5>
                                <p class="uk-p mt-2 text-right">
                                    ${escape(magazine.description)}
                                </p>
                            </div>
                        </a>`;
                        })
                        .join("");

                    container.innerHTML = html;
                });
        </script>
    </body>
</html>
